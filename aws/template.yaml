AWSTemplateFormatVersion: '2010-09-09'
Description: BirdTag Clean Infrastructure (DynamoDB + S3 only, safe rollback)

Resources:

  BirdMediaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: BirdMediaTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: mediaId
          AttributeType: S
        - AttributeName: species
          AttributeType: S
        - AttributeName: birdCount
          AttributeType: N
        - AttributeName: tagsetHash
          AttributeType: S
      KeySchema:
        - AttributeName: mediaId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: species-count
          KeySchema:
            - AttributeName: species
              KeyType: HASH
            - AttributeName: birdCount
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: tagset-similar
          KeySchema:
            - AttributeName: tagsetHash
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-media-bucket"
      NotificationConfiguration:
        LambdaConfigurations: []
